name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker builder image
        run: docker build -t mq-top-builder -f Dockerfile.build .

      - name: Compile binary and bundle
        run: |
          mkdir -p out
          docker run --rm -v "$PWD/out:/go/out" mq-top-builder

      - name: Verify binary
        run: |
          ldd out/mq_top | grep -E "libmqm_r|libmqe_r"
          ls -lh out/mq_top out/mq_top_bundle.tar.gz

      - name: Smoke test – bundle on fresh Ubuntu
        run: |
          docker run --rm \
            -v "$PWD/out:/mnt/out" \
            ubuntu:22.04 bash -c '
              cd /tmp
              tar xzf /mnt/out/mq_top_bundle.tar.gz
              ./mq_top/run.sh --help
            '

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ibmmq-top-linux-amd64
          path: |
            out/mq_top
            out/mq_top_bundle.tar.gz
          retention-days: 7
